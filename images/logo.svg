<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <!-- Shield outline -->
  <path d="M100 5 L190 70 Q195 140 100 215 Q5 140 10 70 Z" fill="#1a1a1a" stroke="#333" stroke-width="4"/>
  <path d="M100 15 L180 72 Q184 135 100 205 Q16 135 20 72 Z" fill="#1a1a1a" stroke="#fff" stroke-width="2"/>

  <!-- Red/white flag background -->
  <clipPath id="shield">
    <path d="M100 15 L180 72 Q184 135 100 205 Q16 135 20 72 Z"/>
  </clipPath>
  <g clip-path="url(#shield)">
    <rect x="0" y="15" width="200" height="60" fill="#CC0000"/>
    <path d="M20 55 Q60 75 100 55 Q140 35 180 55 L180 75 Q140 95 100 75 Q60 55 20 75 Z" fill="white"/>
    <rect x="0" y="75" width="200" height="140" fill="white" opacity="0.9"/>
  </g>

  <!-- Cathedral spire -->
  <polygon points="100,50 95,110 90,120 85,125 115,125 110,120 105,110" fill="#888" stroke="#666" stroke-width="1"/>
  <polygon points="100,50 97,80 103,80" fill="#999"/>

  <!-- Building base -->
  <polygon points="75,125 125,125 130,145 70,145" fill="#777" stroke="#666" stroke-width="1"/>

  <!-- Banner -->
  <path d="M55,150 L145,150 L150,160 L145,170 L55,170 L50,160 Z" fill="#888" stroke="#666" stroke-width="1"/>

  <!-- DOC BERN text -->
  <text x="100" y="164" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="14" fill="#1a1a1a" font-style="italic">DOC BERN</text>
</svg>
